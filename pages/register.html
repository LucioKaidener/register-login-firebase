<!DOCTYPE html>

<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tạo tài khoản - WebDev Studios</title>
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts: Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff9800',
            'primary-hover': '#e68900',
            surface: '#f7f9fb',
            'surface-dim': '#d8dadc',
            'surface-bright': '#f7f9fb',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#f2f4f6',
            'on-surface': '#1a1c1e',
            'on-surface-variant': '#44474e',
            outline: '#74777f',
            'outline-variant': '#c4c7cf',
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
</head>

<body class="page-shell flex flex-col min-h-screen">
  <!-- BEGIN: TopNavBar -->
  <header class="w-full py-6 flex justify-center bg-surface-container-lowest border-b border-outline-variant"
    data-purpose="main-header">
    <div class="logo">
      <img alt="Logo" class="brand-logo"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOt0CVf1khAECj5d6wsxYqFe1BQHgfBI19y7pubLnuGmhtSQ08oQZOOHX1WoKAznOGpescLb3Cbz7AzNNCQxBxfdam5ichjKQxA2xGP6lH3PTFgCvBTq9TPCMONMwdFKRorbOKtDVxyyog1bMtjpgr5ZaBIFN6X5XcgVSuaPZDPXIUf35hgNk9myUwiU4YeCWGsFh7HRahxLv3ppzVoQFjSYTiqlRcG-i3dZnR0Wp6OgozfNjg_gJUmDFxw17SETqtNg" />
    </div>
  </header>
  <!-- END: TopNavBar -->
  <!-- BEGIN: MainContent -->
  <main class="flex-grow flex items-center justify-center py-12 px-4" data-purpose="registration-form-container">
    <div class="auth-card bg-surface-container-lowest w-full max-w-[480px] rounded-custom p-10">
      <!-- Form Header -->
      <div class="text-center mb-8" data-purpose="form-header">
        <h1 class="text-3xl font-extrabold text-on-surface mb-2 tracking-tight">Tạo tài khoản</h1>
        <p class="text-on-surface-variant text-sm font-medium">Tạo tài khoản mới để tiếp tục</p>
      </div>
      <!-- Registration Form -->
      <div id="messageBox" class="message"></div>
      <form id="registerForm" class="space-y-5" data-purpose="signup-form">
        <!-- Email Field -->
        <div class="flex flex-col space-y-2">
          <label class="text-sm font-bold text-on-surface" for="email">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline text-[20px]">mail</span>
            </div>
            <input
              class="field-input block w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-custom focus:ring-2 focus:ring-primary focus:border-primary text-sm transition-all"
              id="email" name="email" placeholder="Nhập địa chỉ email" required="" type="email" />
            <span id="emailStatus" class="field-status"></span>
          </div>
          <p id="emailMessage" class="field-message"></p>
        </div>
        <!-- Password Field -->
        <div class="flex flex-col space-y-2">
          <label class="text-sm font-bold text-on-surface" for="password">Mật khẩu</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
            </div>
            <input
              class="field-input block w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-custom focus:ring-2 focus:ring-primary focus:border-primary text-sm transition-all"
              id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password" />
            <button type="button" id="registerPasswordToggle" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface focus:outline-none" aria-label="Hiện mật khẩu">
              <span class="material-symbols-outlined text-[20px]" id="registerPasswordToggleIcon">visibility</span>
            </button>
            <span id="passwordStatus" class="field-status"></span>
          </div>
          <p class="text-[11px] text-on-surface-variant mt-1 font-medium italic">Ít nhất 8 ký tự, gồm chữ hoa, thường
            &amp; ký tự đặc biệt.</p>
          <p id="passwordMessage" class="field-message"></p>
        </div>
        <!-- Confirm Password Field -->
        <div class="flex flex-col space-y-2">
          <label class="text-sm font-bold text-on-surface" for="confirm-password">Nhập lại mật khẩu</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
            </div>
            <input
              class="field-input block w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-custom focus:ring-2 focus:ring-primary focus:border-primary text-sm transition-all"
              id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required=""
              type="password" />
            <button type="button" id="confirmPasswordToggle" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface focus:outline-none" aria-label="Hiện mật khẩu">
              <span class="material-symbols-outlined text-[20px]" id="confirmPasswordToggleIcon">visibility</span>
            </button>
            <span id="confirmPasswordStatus" class="field-status"></span>
          </div>
          <p id="confirmPasswordMessage" class="field-message"></p>
        </div>
        <!-- Submit Button -->
        <button
          class="primary-btn w-full font-bold py-3.5 rounded-custom flex items-center justify-center transition-all duration-200 mt-6 shadow-sm active:scale-[0.98]"
          data-purpose="submit-btn" type="submit">
          <span>Đăng ký</span>
          <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
        </button>
      </form>
      <!-- Separator -->
      <div class="relative my-8" data-purpose="divider">
        <div aria-hidden="true" class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-outline-variant"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-3 bg-surface-container-lowest text-outline font-medium">Hoặc</span>
        </div>
      </div>
      <!-- Login Link -->
      <div class="text-center text-sm text-on-surface-variant">
        Đã có tài khoản? <a
          class="text-primary font-bold hover:underline decoration-2 underline-offset-4 transition-all" href="/pages/login.html">Đăng
          nhập ngay</a>
      </div>
    </div>
  </main>
  <!-- END: MainContent -->
  <!-- BEGIN: Footer -->
  <footer class="page-footer w-full py-8 px-8" data-purpose="main-footer">
    <div
      class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-on-surface-variant">
      <div class="flex items-center space-x-2 mb-4 md:mb-0">
        <img alt="Logo Small" class="h-5 w-auto object-contain"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjnCK2_fCPh0oA6aIsRsNVRW-Kif55yuNfj_qFacSAPa7oaahHwaadywNR8pDUdAnrkkgQtyQXU14itWaIXD0jzAHhtuDA2np4jnYj46hjMARJ2qyN0WmlAedi1t7sTm4FSxApWbCiPya-WrGrll6S6mUZIii9A_Nlq-j5DxozfJQVS5TOUJMpQctsz6UO9TS3q2oiG7QkbYD3YZM6kp_WYS7N1HMIfMR2hik4p0eJKcL01wfsMhUyfguduQYTiWTPVw"
          style="clip-path: inset(0% 75% 90% 15%); transform: scale(3.5); transform-origin: top left;" />
        <span class="font-medium">© 2024 WebDev Studios. Tất cả quyền được bảo lưu.</span>
      </div>
      <nav class="flex space-x-6 font-semibold">
        <a class="hover:text-primary transition-colors" href="#">Điều khoản</a>
        <a class="hover:text-primary transition-colors" href="#">Bảo mật</a>
        <a class="hover:text-primary transition-colors" href="#">Liên hệ</a>
      </nav>
    </div>
  </footer>
  <!-- END: Footer -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="../js/app.js"></script>
</body>

</html>
